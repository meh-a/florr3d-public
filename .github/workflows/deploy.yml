name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # Pages is a static host: no server route can hand the client the map
      # payload the way vite dev / the standalone server do, so pre-export it
      # (normalized the same way server/map.js does, not the raw builder
      # file) as a plain static asset that boot.js fetches at ${BASE_URL}map.json.
      - run: node tools/export-static-map.mjs
      # Set the GAME_SERVER_URL repository variable (Settings, Secrets and
      # variables, Actions, Variables) to e.g. wss://yourserver.example/ws
      # to pin the Pages build to a dedicated game server. Leave it unset and
      # the Pages build falls back to the in-browser worker sim.
      - run: npm run build
        env:
          VITE_WS_URL: ${{ vars.GAME_SERVER_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
